<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sexify - 發現你的專屬美好</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { display: none; }   
        body { -webkit-tap-highlight-color: transparent; background-color: #f7f7f7; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; }
        :root { --sexify: #ff2442; }
        .text-sexify { color: var(--sexify); }
        .bg-sexify { background-color: var(--sexify); }
        
        /* 瀑布流：改回 2 欄以符合小紅書主流美感 */
        .masonry-grid { display: flex; padding: 6px; gap: 6px; }
        .masonry-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }

        .masonry-item { 
            break-inside: avoid; 
            background: white; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }
        .masonry-item:active { transform: scale(0.98); }
        .masonry-item img { width: 100%; height: auto; display: block; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 文字截斷 */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .heart-active { animation: heartBeat 0.3s ease-out; color: var(--sexify) !important; }
    </style>
</head>
<body class="text-gray-900">

    <div id="age-gate" class="fixed inset-0 z-[2000] bg-black flex items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-10 rounded-[2.5rem] w-11/12 max-w-sm text-center shadow-2xl">
            <h2 class="text-4xl font-black text-sexify mb-3 tracking-tighter">SEXIFY</h2>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">此空間包含成人內容<br>進入即代表您已滿 18 歲</p>
            <button onclick="verifyAge()" class="w-full bg-sexify text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition">確認進入</button>
        </div>
    </div>

    <div id="app-content" class="filter blur-2xl pointer-events-none transition-all duration-700">
        <header class="sticky top-0 bg-white/95 backdrop-blur-xl border-b z-40 px-4 h-12 flex justify-between items-center">
            <i class="fa-solid fa-bars text-gray-400"></i>
            <div class="flex space-x-6 items-center">
                <button class="text-gray-400 text-sm font-bold">關注</button>
                <div class="relative">
                    <button class="text-black text-base font-black">發現</button>
                    <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-4 h-0.5 bg-sexify rounded-full"></div>
                </div>
                <button class="text-gray-400 text-sm font-bold">附近</button>
            </div>
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        </header>

        <main class="pb-24">
            <section id="home-tab" class="tab-content active">
                <div class="masonry-grid">
                    <div class="masonry-col">
                        <div class="masonry-item" onclick="openDetail('https://picsum.photos/400/600?random=11', 'Xaiver', 'https://i.pravatar.cc/100?u=a1', '深夜驚喜！🍆 給你的獨家福利', '5', 'card-xaiver')">
                            <div class="relative">
                                <img src="https://picsum.photos/400/600?random=11">
                                <div class="absolute inset-0 bg-black/10 flex items-center justify-center"><i class="fa-solid fa-lock text-white/80 text-lg"></i></div>
                            </div>
                            <div class="p-2.5">
                                <h4 class="text-[13px] font-medium leading-snug line-clamp-2 mb-2 text-gray-800">深夜驚喜！🍆 給你的獨家福利都在這</h4>
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-1.5 overflow-hidden">
                                        <img src="https://i.pravatar.cc/100?u=a1" class="w-5 h-5 rounded-full border border-gray-100">
                                        <span class="text-[11px] text-gray-500 truncate">Xaiver</span>
                                    </div>
                                    <div class="flex items-center gap-0.5 text-gray-500" onclick="event.stopPropagation(); toggleLike(this)">
                                        <i class="fa-regular fa-heart text-[12px]"></i>
                                        <span class="like-count text-[11px]">5</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="masonry-col">
                        <div class="masonry-item" onclick="openDetail('https://picsum.photos/400/400?random=12', 'Mina_米娜', 'https://i.pravatar.cc/100?u=a2', '衣服都被雨水打濕了🌧️', '892', 'card-mina')">
                            <img src="https://picsum.photos/400/400?random=12">
                            <div class="p-2.5">
                                <h4 class="text-[13px] font-medium leading-snug line-clamp-2 mb-2 text-gray-800">衣服都被雨水打濕了🌧️ 真的好冷喔...</h4>
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-1.5">
                                        <img src="https://i.pravatar.cc/100?u=a2" class="w-5 h-5 rounded-full border border-gray-100">
                                        <span class="text-[11px] text-gray-500 truncate">Mina_米娜</span>
                                    </div>
                                    <div class="flex items-center gap-0.5 text-gray-500" onclick="event.stopPropagation(); toggleLike(this)">
                                        <i class="fa-regular fa-heart text-[12px]"></i>
                                        <span class="like-count text-[11px]">892</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="shop-tab" class="tab-content p-4">
                <div class="bg-white rounded-2xl p-6 mb-4 shadow-sm border border-gray-50 relative overflow-hidden">
                    <h2 class="text-xl font-black mb-1 flex items-center gap-2"><i class="fa-solid fa-store text-sexify"></i>Sexify Store</h2>
                    <p class="text-gray-400 text-[10px] tracking-widest uppercase font-bold">PREMIUM SELECTION / 官方嚴選</p>
                </div>
                <div class="grid grid-cols-2 gap-3" id="shop-grid"></div>
            </section>

            <section id="profile-tab" class="tab-content">
                <div class="bg-white p-8 pt-10 text-center border-b">
                    <div class="relative w-20 h-20 mx-auto mb-4">
                        <img src="https://i.pravatar.cc/300?u=me" class="rounded-full border-2 border-white shadow-md">
                        <div class="absolute bottom-0 right-0 bg-sexify text-white p-1.5 rounded-full border-2 border-white shadow-sm"><i class="fa-solid fa-camera text-[10px]"></i></div>
                    </div>
                    <h3 class="text-lg font-black">Sexify User #808</h3>
                    <p class="text-gray-400 text-[11px] mt-1">Taipei, Taiwan</p>
                    <div class="flex justify-center gap-10 mt-6 font-bold">
                        <div class="text-center"><p class="text-lg">12</p><p class="text-[11px] text-gray-400 font-normal">動態</p></div>
                        <div class="text-center"><p class="text-lg">8.5k</p><p class="text-[11px] text-gray-400 font-normal">粉絲</p></div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-0.5 mt-1 bg-white" id="user-gallery"></div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t flex items-center h-14 z-[999] px-2 shadow-sm">
            <div class="flex flex-1 justify-around">
                <button onclick="switchTab('home-tab', this)" class="nav-btn nav-active flex flex-col items-center"><span class="text-[15px] font-bold">首頁</span></button>
                <button onclick="switchTab('shop-tab', this)" class="nav-btn flex flex-col items-center text-gray-400"><span class="text-[15px] font-bold">商店</span></button>
            </div>
            <div class="w-14 flex justify-center">
                <button onclick="openUpload()" class="w-10 h-8 bg-sexify text-white rounded-lg shadow-sm active:scale-90 transition flex items-center justify-center font-bold text-xl">+</button>
            </div>
            <div class="flex flex-1 justify-around">
                <button class="nav-btn flex flex-col items-center text-gray-400"><span class="text-[15px] font-bold">消息</span></button>
                <button onclick="switchTab('profile-tab', this)" class="nav-btn flex flex-col items-center text-gray-400"><span class="text-[15px] font-bold">我</span></button>
            </div>
        </footer>
    </div>

    <section id="upload-tab" class="fixed inset-0 z-[1500] bg-white hidden flex-col">
        <div class="flex items-center justify-between px-4 py-4 border-b">
            <button onclick="closeUpload()" class="text-gray-500 text-sm font-bold">取消</button>
            <h2 class="text-base font-black">發佈新動態</h2>
            <button onclick="startUpload()" class="text-sexify font-black text-sm">發佈</button>
        </div>
        <div class="p-6 overflow-y-auto">
            <div id="drop-area" onclick="document.getElementById('file-input').click()" class="aspect-[3/4] border-2 border-dashed border-gray-200 rounded-3xl flex flex-col items-center justify-center bg-gray-50 relative overflow-hidden active:scale-[0.98] transition">
                <div id="preview-container" class="absolute inset-0 hidden bg-black">
                    <img id="file-preview" class="w-full h-full object-contain">
                    <button onclick="event.stopPropagation(); resetUpload()" class="absolute top-4 right-4 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-md">✕</button>
                </div>
                <div id="upload-prompt" class="text-center">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-300 mb-4"></i>
                    <p class="text-sm text-gray-400 font-bold">選取精彩照片或影片</p>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleFileSelect(this)">
            </div>
            <textarea placeholder="寫點什麼吸引粉絲..." class="w-full mt-6 text-sm border-none focus:ring-0 resize-none h-32 p-0" id="upload-text"></textarea>
        </div>
    </section>

    <div id="post-detail" class="fixed inset-0 z-[3000] bg-white translate-y-full transition-transform duration-300 ease-out overflow-y-auto hidden">
        <div class="sticky top-0 bg-white/80 backdrop-blur-md flex items-center justify-between px-4 h-12 z-10 border-b">
            <button onclick="closeDetail()" class="text-xl px-2">✕</button>
            <div class="flex items-center gap-2"><img id="detail-avatar" src="" class="w-7 h-7 rounded-full"><span id="detail-username" class="text-sm font-bold"></span></div>
            <button class="bg-sexify text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm">關注</button>
        </div>
        <div class="pb-24">
            <img id="detail-image" src="" class="block mx-auto w-full object-contain bg-gray-50">
            <div class="p-5">
                <h2 id="detail-title" class="text-lg font-black mb-3"></h2>
                <p class="text-sm text-gray-600 leading-relaxed">這是一段充滿生活質感的描述內容 ✨</p>
                <div class="mt-4 text-[11px] text-gray-300">昨天 18:30 · 台北市</div>
            </div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t flex items-center justify-between px-4 h-16 z-50">
            <div class="flex-1 bg-gray-100 rounded-full px-4 py-2.5 text-gray-500 text-xs mr-4" onclick="openComments()">說點什麼...</div>
            <div class="flex items-center space-x-6 px-2">
                <div class="flex flex-col items-center" onclick="toggleLike(this)"><i class="fa-regular fa-heart text-xl"></i><span class="text-[10px] like-count font-bold mt-0.5 text-gray-500">0</span></div>
                <div class="flex flex-col items-center" onclick="openComments()"><i class="fa-regular fa-message text-xl"></i><span class="text-[10px] font-bold mt-0.5 text-gray-500">留言</span></div>
            </div>
        </div>
    </div>

    <div id="comment-sheet" class="fixed inset-0 z-[3100] hidden">
        <div class="absolute inset-0 bg-black/40" onclick="closeComments()"></div>
        <div id="comment-panel" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[1.5rem] h-[70vh] translate-y-full transition-transform duration-300 flex flex-col">
            <div class="p-4 border-b text-center relative"><span class="font-bold text-sm">共 0 條評論</span><button onclick="closeComments()" class="absolute right-4 text-gray-400">✕</button></div>
            <div class="flex-1 overflow-y-auto p-4 space-y-6" id="comment-list"></div>
            <div class="p-3 border-t pb-8 flex items-center gap-3"><input type="text" id="comment-input" placeholder="說點什麼..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none text-sm"><button onclick="sendComment()" class="text-sexify font-bold text-sm">發送</button></div>
        </div>
    </div>

    <script>
        // 核心功能邏輯
        const postComments = { 'card-xaiver': [], 'card-mina': [] };
        
        function verifyAge() { 
            document.getElementById('age-gate').classList.add('opacity-0'); 
            setTimeout(() => { 
                document.getElementById('age-gate').style.display = 'none'; 
                document.getElementById('app-content').classList.remove('blur-2xl', 'pointer-events-none'); 
            }, 500); 
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => { 
                b.classList.remove('nav-active', 'text-black'); 
                b.classList.add('text-gray-400'); 
            });
            if(btn) { btn.classList.add('nav-active'); btn.classList.remove('text-gray-400'); }
            if(tabId === 'shop-tab') renderShop();
            if(tabId === 'profile-tab') renderProfile();
        }

        function renderShop() {
            const products = [
                { name: "1對1 私密聊", price: 49, oldPrice: 99, img: "https://picsum.photos/300/300?random=21" },
                { name: "數位寫真集", price: 99, oldPrice: 199, img: "https://picsum.photos/300/300?random=22" },
                { name: "VIP 頻道", price: 199, oldPrice: 299, img: "https://picsum.photos/300/300?random=23" },
                { name: "限量拍立得", price: 299, oldPrice: 499, img: "https://picsum.photos/300/300?random=24" }
            ];
            document.getElementById('shop-grid').innerHTML = products.map(p => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 active:scale-95 transition">
                    <img src="${p.img}" class="w-full aspect-square object-cover">
                    <div class="p-3">
                        <h4 class="text-xs font-bold truncate text-gray-700">${p.name}</h4>
                        <div class="mt-1 flex items-baseline gap-1"><span class="text-sexify font-black text-sm">$${p.price}</span><span class="text-gray-300 line-through text-[10px]">$${p.oldPrice}</span></div>
                    </div>
                </div>
            `).join('');
        }

        function renderProfile() {
            const grid = document.getElementById('user-gallery');
            if(grid.innerHTML !== "") return;
            let items = "";
            for(let i=1; i<=12; i++) { 
                items += `<div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/200/200?random=${i+50}" class="w-full h-full object-cover active:opacity-70"></div>`; 
            }
            grid.innerHTML = items;
        }

        function openDetail(imgSrc, username, avatar, title, likeCount, cardId) {
            const detail = document.getElementById('post-detail');
            document.getElementById('detail-image').src = imgSrc;
            document.getElementById('detail-avatar').src = avatar;
            document.getElementById('detail-username').innerText = username;
            document.getElementById('detail-title').innerText = title;
            detail.dataset.sourceId = cardId;
            detail.querySelector('.like-count').innerText = likeCount;
            detail.classList.remove('hidden');
            setTimeout(() => detail.classList.remove('translate-y-full'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() { 
            document.getElementById('post-detail').classList.add('translate-y-full'); 
            document.body.style.overflow = ''; 
            setTimeout(() => document.getElementById('post-detail').classList.add('hidden'), 300); 
        }

        function openComments() { 
            document.getElementById('comment-sheet').classList.remove('hidden'); 
            setTimeout(() => document.getElementById('comment-panel').classList.remove('translate-y-full'), 10); 
        }

        function closeComments() { 
            document.getElementById('comment-panel').classList.add('translate-y-full'); 
            setTimeout(() => document.getElementById('comment-sheet').classList.add('hidden'), 300); 
        }

        function toggleLike(el) {
            const heart = el.querySelector('i');
            const countSpan = el.querySelector('.like-count');
            let count = parseInt(countSpan.innerText);
            if (heart.classList.contains('fa-regular')) { 
                heart.className = 'fa-solid fa-heart heart-active'; 
                count++; 
            } else { 
                heart.className = 'fa-regular fa-heart'; 
                count--; 
            }
            countSpan.innerText = count;
        }

        function openUpload() { document.getElementById('upload-tab').classList.remove('hidden'); }
        function closeUpload() { document.getElementById('upload-tab').classList.add('hidden'); }

        function handleFileSelect(i) {
            const file = i.files[0];
            if (file) {
                const r = new FileReader();
                r.onload = (e) => { 
                    document.getElementById('upload-prompt').classList.add('hidden'); 
                    document.getElementById('preview-container').classList.remove('hidden'); 
                    document.getElementById('file-preview').src = e.target.result; 
                };
                r.readAsDataURL(file);
            }
        }
        function resetUpload() { 
            document.getElementById('file-input').value = ""; 
            document.getElementById('preview-container').classList.add('hidden'); 
            document.getElementById('upload-prompt').classList.remove('hidden'); 
        }
        function startUpload() { alert("🚀 發佈成功！"); closeUpload(); resetUpload(); }
    </script>
</body>
</html>
