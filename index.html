<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sexify - 發現你的專屬美好</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { display: none; }   
        body { -webkit-tap-highlight-color: transparent; background-color: #f8f8f8; font-family: sans-serif; }
        :root { --sexify: #ff2442; }
        .text-sexify { color: var(--sexify); }
        .bg-sexify { background-color: var(--sexify); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 1. 修正：主頁瀑布流 - 縮小間距，讓圖看起來精緻 */
        .masonry-grid { column-count: 2; column-gap: 6px; padding: 6px; }
        .masonry-item { break-inside: avoid; margin-bottom: 6px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .masonry-item img { width: 100%; height: auto; display: block; }

        /* 2. 修正：Icon 動畫與導航風格 */
        .nav-active { color: #000 !important; font-weight: 900 !important; }
        .nav-btn i { font-size: 1.2rem; } /* 控制全局 Icon 大小 */
    </style>
</head>
<body class="text-gray-900">

    <div id="age-gate" class="fixed inset-0 z-[2000] bg-black flex items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-10 rounded-[2.5rem] w-11/12 max-w-sm text-center shadow-2xl">
            <h2 class="text-4xl font-black text-sexify mb-3 tracking-tighter">SEXIFY</h2>
            <p class="text-gray-400 text-sm mb-8">進入即代表您已滿 18 歲</p>
            <button onclick="verifyAge()" class="w-full bg-sexify text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition">確認進入</button>
        </div>
    </div>

    <div id="app-content" class="filter blur-2xl pointer-events-none transition-all duration-700">
        <header class="sticky top-0 bg-white/90 backdrop-blur-xl border-b z-40 px-5 h-14 flex justify-between items-center">
            <i class="fa-solid fa-bars-staggered text-gray-400"></i>
            <div class="flex space-x-6">
                <button class="text-gray-400 text-sm font-bold">關注</button>
                <button class="text-black text-base font-black border-b-2 border-sexify pb-0.5">發現</button>
                <button class="text-gray-400 text-sm font-bold">附近</button>
            </div>
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        </header>

        <main class="pb-24">
            <section id="home-tab" class="tab-content active">
                <div class="masonry-grid">
                    <div class="masonry-item" onclick="openDetail('https://picsum.photos/400/600?random=11', 'Xaiver_Professional', 'https://i.pravatar.cc/100?u=a1', '深夜驚喜！🍆', '5', 'card-xaiver')">
                        <div class="relative"><img src="https://picsum.photos/400/600?random=11"></div>
                        <div class="p-2">
                            <h4 class="text-[12px] font-bold mb-1 line-clamp-1">深夜驚喜！🍆 給你的驚喜</h4>
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-1 flex-1 min-w-0">
                                    <img src="https://i.pravatar.cc/100?u=a1" class="w-4 h-4 rounded-full flex-shrink-0">
                                    <span class="text-[11px] text-gray-500 truncate">Xaiver_Professional</span>
                                </div>
                                <div class="flex items-center gap-0.5 text-gray-400 ml-2" onclick="event.stopPropagation(); toggleLike(this)">
                                    <i class="fa-regular fa-heart text-[11px]"></i>
                                    <span class="like-count text-[10px]">5</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="shop-tab" class="tab-content p-3">
                <div class="grid grid-cols-3 gap-2" id="shop-grid">
                    </div>
            </section>

            <section id="upload-tab" class="tab-content bg-white min-h-screen">
                <div class="flex items-center justify-between px-4 py-4 border-b">
                    <button onclick="switchTab('home-tab')" class="text-gray-400 text-sm">取消</button>
                    <h2 class="text-base font-black">發佈動態</h2>
                    <button onclick="startUpload()" class="text-sexify font-black text-sm">發佈</button>
                </div>
                <div class="p-5">
                    <div onclick="document.getElementById('file-input').click()" class="aspect-[3/4] border-2 border-dashed border-gray-100 rounded-3xl flex items-center justify-center bg-gray-50 relative overflow-hidden">
                        <div id="preview-container" class="absolute inset-0 hidden bg-black">
                            <img id="file-preview" class="w-full h-full object-contain">
                            <button onclick="event.stopPropagation(); resetUpload()" class="absolute top-3 right-3 bg-black/40 text-white w-7 h-7 rounded-full flex items-center justify-center">✕</button>
                        </div>
                        <div id="upload-prompt" class="text-center">
                            <i class="fa-solid fa-camera text-gray-200 text-3xl mb-2"></i>
                            <p class="text-xs text-gray-400 font-bold">選取照片或影片</p>
                        </div>
                        <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleFileSelect(this)">
                    </div>
                </div>
            </section>

            <section id="profile-tab" class="tab-content">
                <div class="bg-white p-8 text-center border-b">
                    <img src="https://i.pravatar.cc/300?u=me" class="w-20 h-20 rounded-full mx-auto border-4 border-white shadow-lg">
                    <h3 class="text-lg font-black mt-4">Sexify User #808</h3>
                </div>
                <div class="grid grid-cols-3 gap-0.5 mt-1" id="user-gallery"></div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t flex items-center h-16 z-[999] px-2">
            <div class="flex flex-1 justify-around">
                <button onclick="switchTab('home-tab', this)" class="nav-btn nav-active flex flex-col items-center text-gray-400"><i class="fa-solid fa-house"></i><span class="text-[9px] font-bold mt-1">發現</span></button>
                <button onclick="switchTab('shop-tab', this)" class="nav-btn flex flex-col items-center text-gray-400"><i class="fa-solid fa-bag-shopping"></i><span class="text-[9px] font-bold mt-1">商店</span></button>
            </div>
            <div class="w-16 flex justify-center">
                <button onclick="switchTab('upload-tab')" class="w-12 h-10 bg-gray-900 text-white rounded-xl shadow-lg active:scale-95 transition flex items-center justify-center font-bold text-2xl">+</button>
            </div>
            <div class="flex flex-1 justify-around">
                <button class="nav-btn flex flex-col items-center text-gray-400"><i class="fa-solid fa-comment-dots"></i><span class="text-[9px] font-bold mt-1">消息</span></button>
                <button onclick="switchTab('profile-tab', this)" class="nav-btn flex flex-col items-center text-gray-400"><i class="fa-solid fa-user"></i><span class="text-[9px] font-bold mt-1">我</span></button>
            </div>
        </footer>
    </div>

    <script>
        function verifyAge() {
            document.getElementById('age-gate').classList.add('opacity-0');
            setTimeout(() => { document.getElementById('age-gate').style.display = 'none'; document.getElementById('app-content').classList.remove('blur-2xl', 'pointer-events-none'); }, 500);
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-400'); });
                btn.classList.add('nav-active'); btn.classList.remove('text-gray-400');
            }
            if(tabId === 'shop-tab') renderShop();
            if(tabId === 'profile-tab') renderProfile();
        }

        function renderShop() {
            const products = [
                { name: "福利私密圖", price: 49.0, oldPrice: 99.0, img: "https://picsum.photos/300/300?random=20" },
                { name: "1對1 私聊", price: 149.0, oldPrice: 299.0, img: "https://picsum.photos/300/300?random=21" },
                { name: "數位寫真", price: 129.0, oldPrice: 199.0, img: "https://picsum.photos/300/300?random=22" }
            ];
            // 修正：商店使用 grid-cols-3，並縮小文字
            document.getElementById('shop-grid').innerHTML = products.map(p => `
                <div class="bg-white rounded-lg overflow-hidden border border-gray-100 flex flex-col">
                    <div class="aspect-square w-full"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <div class="p-1.5">
                        <p class="text-[10px] font-bold truncate text-gray-800">${p.name}</p>
                        <p class="text-sexify font-black text-xs mt-0.5">$${p.price}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderProfile() {
            const grid = document.getElementById('user-gallery');
            if(grid.innerHTML !== "") return;
            let items = "";
            for(let i=1; i<=12; i++) {
                items += `<div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/200/200?random=${i+50}" class="w-full h-full object-cover"></div>`;
            }
            grid.innerHTML = items;
        }

        // 上傳功能邏輯
        function handleFileSelect(i) {
            const file = i.files[0];
            if (file) {
                const r = new FileReader();
                r.onload = (e) => {
                    document.getElementById('upload-prompt').classList.add('hidden');
                    document.getElementById('preview-container').classList.remove('hidden');
                    document.getElementById('file-preview').src = e.target.result;
                };
                r.readAsDataURL(file);
            }
        }
        function resetUpload() {
            document.getElementById('file-input').value = "";
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('upload-prompt').classList.remove('hidden');
        }
        function startUpload() { alert("🚀 發佈成功！"); resetUpload(); switchTab('home-tab'); }
        
        function toggleLike(el) {
            const heart = el.querySelector('i');
            heart.classList.toggle('fa-regular');
            heart.classList.toggle('fa-solid');
            heart.classList.toggle('text-sexify');
        }
    </script>
</body>
</html>
